<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Camino</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#F2EFE4" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Camino" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

:root{
  --paper:#F2EFE4; --contour:#DDD6BE; --ink:#28372E; --ink-soft:#5C6B5F;
  --trail:#BF3B2B; --done:#2F6B4A; --gold:#C9992E; --white:#fff;
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  background:var(--paper); color:var(--ink);
  font-family:'Space Grotesk',system-ui,sans-serif;
  min-height:100vh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  -webkit-tap-highlight-color:transparent;
}
.wrap{ max-width:560px; margin:0 auto; padding:28px 20px 60px; }
.eyebrow{ font-family:'Space Mono',monospace; font-size:11.5px; letter-spacing:.14em; color:var(--ink-soft); margin:0; }
h1{ font-family:'Fraunces',serif; font-size:36px; line-height:1.12; margin:8px 0 10px; font-weight:600; }
h1.small{ font-size:28px; margin:4px 0 0; }
.muted{ color:var(--ink-soft); font-size:15px; line-height:1.5; }

.banner{ margin-top:12px; background:#F7E8E3; border:1.5px solid var(--trail); color:#7A2418;
  border-radius:10px; padding:10px 14px; font-size:14px; line-height:1.4; }

.card{ background:var(--white); border:1.5px solid var(--ink); border-radius:14px; padding:16px 18px; margin:14px 0; }
.card h2{ font-family:'Fraunces',serif; font-size:21px; margin:0; font-weight:600; }
.card .meta{ font-family:'Space Mono',monospace; font-size:12.5px; color:var(--ink-soft); }
.bar{ height:6px; background:#EDEAE0; border-radius:3px; margin:12px 0 4px; overflow:hidden; }
.bar > div{ height:100%; background:var(--done); border-radius:3px; transition:width .6s ease, background .3s ease; }
.bar > div.full{ background:var(--gold); }

button{ font-family:inherit; cursor:pointer; }
button:disabled{ cursor:default; }
.btn{ background:var(--trail); color:#fff; border:none; border-radius:12px;
  padding:14px 20px; font-size:16px; font-weight:600; letter-spacing:.01em; width:100%; }
.btn.small{ padding:11px 16px; font-size:15px; margin-top:10px; }
.btn.done{ background:var(--done); }
.btn.ink{ background:var(--ink); }
.btn-ghost{ background:none; border:1.5px solid var(--ink); color:var(--ink);
  border-radius:10px; padding:10px 16px; font-size:14px; }
.btn-ghost.danger{ color:#9C2B1D; border-color:#9C2B1D; }
.back{ background:none; border:none; padding:0; margin-bottom:14px;
  font-family:'Space Mono',monospace; font-size:13px; color:var(--ink-soft); }

label{ display:block; font-family:'Space Mono',monospace; font-size:12px;
  letter-spacing:.08em; color:var(--ink-soft); margin-bottom:6px; }
input{ padding:12px 14px; font-size:16px; font-family:inherit;
  border:1.5px solid var(--ink); border-radius:10px; background:#fff; color:var(--ink); width:100%; }
input:focus, button:focus-visible{ outline:2px solid var(--trail); outline-offset:2px; }

.type-btn{ flex:1; text-align:left; background:var(--white); color:var(--ink);
  border:1.5px solid var(--ink); border-radius:10px; padding:10px 12px; }
.type-btn.sel{ background:var(--ink); color:var(--white); }
.type-btn .t{ font-weight:600; font-size:14.5px; }
.type-btn .d{ font-size:12px; opacity:.75; margin-top:2px; }

.ex-row{ display:flex; gap:8px; margin-bottom:8px; }
.ex-row input.reps{ width:84px; text-align:center; font-family:'Space Mono',monospace; }
.ex-del{ background:none; border:1.5px solid var(--ink-soft); color:var(--ink-soft);
  border-radius:10px; width:44px; min-width:44px; font-size:18px; }
.ex-add{ background:none; border:1.5px dashed var(--ink-soft); color:var(--ink-soft);
  border-radius:10px; padding:9px 14px; font-size:14px; width:100%; }

.rp{ margin-top:14px; background:var(--white); border:1.5px solid var(--ink); border-radius:14px; padding:14px 16px; }
.rp .head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
.rp .tag{ font-family:'Space Mono',monospace; font-size:11.5px; letter-spacing:.1em; color:var(--ink-soft); }
.rp .pct{ font-family:'Space Mono',monospace; font-size:12.5px; font-weight:700; }
.rp .series-row{ display:flex; align-items:center; gap:6px; margin:6px 0 8px;
  font-family:'Space Mono',monospace; font-size:11px; color:var(--ink-soft); }
.rp .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; border:1.5px solid var(--ink-soft); }
.rp .dot.on{ background:var(--done); border-color:var(--done); }
.rp .row{ display:flex; align-items:center; gap:12px; padding:9px 2px; border-bottom:1px solid #EDEAE0; }
.rp .tick{ width:28px; height:28px; min-width:28px; border-radius:50%; border:2px solid var(--ink-soft);
  color:var(--white); display:inline-flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; transition:all .2s ease; }
.rp .tick.mid{ background:var(--gold); border-color:var(--gold); }
.rp .tick.ok{ background:var(--done); border-color:var(--done); }
.rp .exname{ flex:1; font-size:15.5px; }
.rp .exsub{ display:block; font-family:'Space Mono',monospace; font-size:11px; color:var(--ink-soft); }
.rp input.rep{ width:52px; padding:8px 4px; font-size:16px; font-family:'Space Mono',monospace;
  text-align:center; border:1.5px solid var(--ink-soft); border-radius:8px; }
.rp input.rep::-webkit-outer-spin-button, .rp input.rep::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
.rp .stpwrap{ display:flex; align-items:center; gap:6px; }
.rp .stp{ width:44px; height:44px; min-width:44px; border-radius:10px; border:1.5px solid var(--ink);
  background:var(--white); color:var(--ink); font-size:22px; font-weight:600; line-height:1; padding:0;
  touch-action:manipulation; user-select:none; -webkit-user-select:none; }
.rp .tick{ cursor:pointer; }
.rp .tick.locked{ cursor:default; }
.rp .total-final{ font-family:'Space Mono',monospace; font-size:15px; font-weight:700; color:var(--done);
  width:68px; text-align:center; }
.rp .actions{ display:flex; gap:10px; margin-top:14px; }
.rp .act{ flex:1; border:none; border-radius:10px; padding:12px 10px; font-size:15px; font-weight:600; }
.rp .act.serie{ background:var(--ink); color:var(--white); }
.rp .act.dia{ background:var(--trail); color:var(--white); }
.rp .act:disabled{ background:#EDEAE0; color:var(--ink-soft); }
.rp .hintline{ margin:10px 0 0; font-size:13px; line-height:1.45; color:var(--ink-soft); }
.rp .hintline.sealed{ color:var(--done); font-weight:600; }
.rp .confirm{ flex:1; display:flex; gap:6px; align-items:center; font-size:12.5px; line-height:1.2; }
.rp .confirm .yes{ background:var(--trail); color:#fff; border:none; border-radius:8px; padding:9px 12px; font-weight:700; }
.rp .confirm .no{ background:#EDEAE0; border:none; border-radius:8px; padding:9px 12px; }

.scroller{ overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; margin-top:10px; }
.hint{ text-align:center; font-family:'Space Mono',monospace; font-size:11px;
  color:var(--ink-soft); margin:6px 0 18px; }
.opts{ max-width:640px; margin:0 auto; padding:0 20px 60px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.gold-box{ margin-top:14px; background:#F3EAD2; border:1.5px solid var(--gold); border-radius:12px; padding:14px 16px; }
.gold-box p{ margin:0; }
.gold-box .title{ font-family:'Fraunces',serif; font-size:20px; font-weight:600; }
.confirm-inline{ display:flex; align-items:center; gap:10px; width:100%; font-size:14px; }
.confirm-inline .yes{ background:#9C2B1D; color:#fff; border:none; border-radius:8px; padding:8px 16px; font-weight:600; }
.confirm-inline .no{ background:#EDEAE0; border:none; border-radius:8px; padding:8px 16px; }
.center{ min-height:85vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.center > div{ max-width:440px; width:100%; }
#avatar{ transition:transform .8s cubic-bezier(.4,0,.2,1); }
@media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
// ============ Constantes ============
const KEY = "camino-habitos-v2";
const SPACING = 64, PAD = 90, LINE_Y = 170, SVG_H = 240;
const COL = { paper:"#F2EFE4", contour:"#DDD6BE", ink:"#28372E", inkSoft:"#5C6B5F",
              trail:"#BF3B2B", done:"#2F6B4A", gold:"#C9992E", white:"#fff" };

// ============ Fechas locales ============
function localDate(d = new Date()){
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"),
        day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function yesterdayStr(){ const d = new Date(); d.setDate(d.getDate()-1); return localDate(d); }

// ============ Estado ============
let habits = [];
let view = "list";
let notices = [];
let confirming = null;     // {id, action} para reiniciar/borrar
let confirmEnd = false;    // confirmación de "Día terminado"
let walking = false;
let walkTimer = null;
let animFrom = null;
let formState = null;      // {name, days, type, items:[{name,reps}], series}
let dateSeen = localDate();

// ============ Persistencia ============
function normalize(list){
  return list.map((h) => {
    const n = Object.assign(
      { type:"simple", items:[], dayChecks:null, seriesTarget:1, dayScores:[] }, h
    );
    n.items = (n.items || []).map((it) =>
      typeof it === "string" ? { name: it, reps: 1 } : it
    );
    // dayChecks de versiones previas o incoherentes: descartar (el día registrado no se pierde)
    if (
      n.dayChecks &&
      (!Array.isArray(n.dayChecks.reps) ||
        n.dayChecks.reps.length !== n.items.length ||
        !Array.isArray(n.dayChecks.totals) ||
        n.dayChecks.totals.length !== n.items.length)
    ) n.dayChecks = null;
    return n;
  });
}
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    habits = raw ? normalize((JSON.parse(raw).habits) || []) : [];
  }catch(e){ habits = []; }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify({habits})); }
  catch(e){ console.error("No se pudo guardar", e); }
}

// Reinicios por día fallado. Devuelve true si hubo cambios.
function checkMissedDays(){
  const today = localDate(), yest = yesterdayStr();
  const msgs = [];
  let changed = false;
  habits = habits.map(h => {
    if(h.streak > 0 && h.lastCheckIn !== today && h.lastCheckIn !== yest){
      msgs.push(`«${h.name}»: fallaste un día y vuelve a la salida (llevabas ${h.streak} ${h.streak===1?"día":"días"}).`);
      changed = true;
      return {...h, streak:0, lastCheckIn:null};
    }
    return h;
  });
  if(changed){ notices = msgs; save(); }
  return changed;
}

// ============ Lógica de rutinas ============
const dayScore = (h, totals) => {
  const ratios = h.items.map((it, i) => Math.min((totals[i] || 0) / (it.reps * h.seriesTarget), 1));
  return ratios.reduce((a, b) => a + b, 0) / ratios.length;
};
const scoreColor = (s) => (s >= 0.999 ? COL.done : s >= 0.5 ? COL.gold : COL.trail);
const freshDay = (h) => ({
  date: localDate(),
  reps: h.items.map(() => 0),
  totals: h.items.map(() => 0),
  series: 0,
});
const editableToday = (h) => h.lastCheckIn !== localDate() && h.streak < h.days;
const todayDC = (h) =>
  h.dayChecks && h.dayChecks.date === localDate() ? h.dayChecks : freshDay(h);

function setReps(id, idx, value){
  const v = Math.max(0, Math.min(999, parseInt(value) || 0));
  const h = habits.find(x => x.id === id);
  if(!h || h.type !== "checklist" || !editableToday(h)) return;
  const dc = todayDC(h);
  dc.reps = [...dc.reps]; dc.reps[idx] = v;
  h.dayChecks = dc;
  save();
  updateRoutineUI(h); // actualización quirúrgica: no re-render (mantiene el foco del input)
}

function finishSeries(id){
  const h = habits.find(x => x.id === id);
  if(!h || h.type !== "checklist" || !editableToday(h)) return;
  const dc = todayDC(h);
  if(!dc.reps.some(r => (r || 0) > 0)) return;
  h.dayChecks = {
    ...dc,
    totals: dc.totals.map((t, i) => (t || 0) + (dc.reps[i] || 0)),
    series: (dc.series || 0) + 1,
    reps: h.items.map(() => 0),
  };
  save();
  render();
}

function finishDay(id){
  const today = localDate();
  const h = habits.find(x => x.id === id);
  if(!h || h.type !== "checklist" || !editableToday(h)) return;
  const dc = todayDC(h);
  const partial = dc.reps.some(r => (r || 0) > 0);
  const totals = dc.totals.map((t, i) => (t || 0) + (partial ? dc.reps[i] || 0 : 0));
  const series = (dc.series || 0) + (partial ? 1 : 0);
  const valid = series >= 1 && h.items.every((_, i) => (totals[i] || 0) >= 1);
  if(!valid) return;
  const ds = [...(h.dayScores || [])];
  ds[h.streak] = dayScore(h, totals);
  if(id === view){
    animFrom = h.streak; walking = true;
    clearTimeout(walkTimer);
    walkTimer = setTimeout(() => { walking = false; animFrom = null; render(); }, 900);
  }
  h.streak += 1;
  h.lastCheckIn = today;
  h.dayScores = ds;
  h.dayChecks = { date: today, reps: h.items.map(() => 0), totals, series, sealedAt: new Date().toISOString() };
  confirmEnd = false;
  save();
  render();
}

// ============ Acciones generales ============
function addHabit(){
  const f = formState;
  const name = f.name.trim();
  const days = Math.max(1, Math.min(365, parseInt(f.days) || 90));
  if(!name) return;
  let items = [], seriesTarget = 1;
  if(f.type === "checklist"){
    items = f.items
      .map(it => ({ name: it.name.trim(), reps: Math.max(1, parseInt(it.reps) || 0) }))
      .filter(it => it.name && it.reps >= 1);
    if(items.length === 0) return;
    seriesTarget = Math.max(1, Math.min(20, parseInt(f.series) || 1));
  }
  const h = { id: "h"+Date.now()+Math.floor(Math.random()*1000),
    name, days, startDate: localDate(), streak:0, lastCheckIn:null,
    type: f.type, items, seriesTarget, dayScores: [], dayChecks: null };
  habits.push(h); save();
  formState = null;
  view = h.id; render();
}
function checkIn(id){
  const today = localDate();
  const h = habits.find(x => x.id === id);
  if(!h || h.lastCheckIn === today || h.streak >= h.days) return;
  if(id === view){
    animFrom = h.streak; walking = true;
    clearTimeout(walkTimer);
    walkTimer = setTimeout(() => { walking = false; animFrom = null; render(); }, 900);
  }
  h.streak += 1; h.lastCheckIn = today;
  save(); render();
}
function resetHabit(id){
  const h = habits.find(x => x.id === id);
  if(h){ h.streak = 0; h.lastCheckIn = null; h.dayScores = []; h.dayChecks = null; save(); }
  confirming = null; render();
}
function deleteHabit(id){
  habits = habits.filter(x => x.id !== id);
  save(); confirming = null; view = "list"; render();
}

// ============ SVG: gladiador animado ============
function animRot(values, dur){
  return `<animateTransform attributeName="transform" type="rotate" values="${values}" dur="${dur}" repeatCount="indefinite"/>`;
}
function gladiadorSVG(walk){
  const step = "0.42s";
  const legL = walk ? animRot("24 -3.5 -9; -24 -3.5 -9; 24 -3.5 -9", step)
                    : animRot("1.5 -3.5 -9; -1.5 -3.5 -9; 1.5 -3.5 -9", "2.8s");
  const legR = walk ? animRot("-24 3.5 -9; 24 3.5 -9; -24 3.5 -9", step)
                    : animRot("-1.5 3.5 -9; 1.5 3.5 -9; -1.5 3.5 -9", "2.8s");
  const bob  = `<animateTransform attributeName="transform" type="translate"
      values="${walk ? "0 0; 0 -1.8; 0 0" : "0 0; 0 -1.2; 0 0"}"
      dur="${walk ? step : "2.8s"}" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>`;
  const shield = walk ? animRot("-8 -6 -22; 8 -6 -22; -8 -6 -22", step)
                      : animRot("-2 -6 -22; 2 -6 -22; -2 -6 -22", "3.2s");
  const sword  = walk ? animRot("12 8 -20; -12 8 -20; 12 8 -20", step)
                      : animRot("3 8 -20; -3 8 -20; 3 8 -20", "3.2s");
  const plume  = walk ? animRot("-6 0 -33; 5 0 -33; -6 0 -33", "0.3s")
                      : animRot("-2.5 0 -33; 2.5 0 -33; -2.5 0 -33", "3.6s");
  return `
  <g ${walk ? 'transform="rotate(6 0 0)"' : ""}>
    <g>${legL}<line x1="-3.5" y1="-9" x2="-4.5" y2="0" stroke="${COL.ink}" stroke-width="3" stroke-linecap="round"/></g>
    <g>${legR}<line x1="3.5" y1="-9" x2="4.5" y2="0" stroke="${COL.ink}" stroke-width="3" stroke-linecap="round"/></g>
    <g>${bob}
      <path d="M -6 -24 L 6 -24 L 8 -9 L -8 -9 Z" fill="${COL.ink}"/>
      <rect x="-7" y="-15" width="14" height="2.6" fill="${COL.gold}"/>
      <g>${shield}
        <circle cx="-11" cy="-17" r="6.5" fill="${COL.gold}" stroke="${COL.ink}" stroke-width="2"/>
        <circle cx="-11" cy="-17" r="2" fill="${COL.ink}"/>
      </g>
      <g>${sword}
        <line x1="9" y1="-19" x2="16" y2="-26" stroke="${COL.ink}" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <circle cx="0" cy="-30" r="5.2" fill="${COL.ink}"/>
      <path d="M -5.5 -31 A 5.5 5.5 0 0 1 5.5 -31 L 5.5 -28.5 L -5.5 -28.5 Z" fill="${COL.inkSoft}"/>
      <g>${plume}<path d="M -6 -33 Q 0 -43 7 -34 Q 1 -37 -3 -32 Z" fill="${COL.trail}"/></g>
    </g>
  </g>`;
}
function coliseoSVG(reached){
  const fill = reached ? COL.gold : COL.paper;
  const arcFill = reached ? COL.paper : COL.contour;
  let arcs = "";
  for(const x of [-9,0,9]){
    arcs += `<path d="M ${x-2.6} 6 L ${x-2.6} -2 A 2.6 2.6 0 0 1 ${x+2.6} -2 L ${x+2.6} 6 Z"
      fill="${arcFill}" stroke="${COL.ink}" stroke-width="1.4"/>`;
  }
  return `<path d="M -16 6 L -16 -10 Q 0 -20 16 -10 L 16 6 Z" fill="${fill}"
    stroke="${COL.ink}" stroke-width="2.5" stroke-linejoin="round"/>${arcs}`;
}

// ============ SVG: camino horizontal ============
// Color del checkpoint i (1..n): en rutinas refleja la puntuación de ese día
function checkpointColor(h, i){
  if(h.type !== "checklist") return COL.done;
  const s = h.dayScores && h.dayScores[i-1] != null ? h.dayScores[i-1] : 1;
  return scoreColor(s);
}
function pathSVG(h){
  const n = h.days;
  const svgW = PAD*2 + n*SPACING;
  const startStreak = (animFrom !== null) ? animFrom : h.streak;
  const doneX = PAD + h.streak*SPACING;
  const avatarStartX = PAD + Math.min(startStreak, n)*SPACING;

  let contours = "";
  for(const y of [40, 90, 215]){
    for(let j = 0; j < Math.ceil(svgW/400); j++){
      contours += `<path d="M ${j*400-20} ${y} C ${j*400+100} ${y-18}, ${j*400+220} ${y+16}, ${j*400+420} ${y-6}"
        fill="none" stroke="${COL.contour}" stroke-width="1.5"/>`;
    }
  }
  let cps = "";
  for(let i = 0; i <= n; i++){
    const x = PAD + i*SPACING;
    const reached = i <= h.streak;
    if(i === 0){
      cps += `<g transform="translate(${x},${LINE_Y})">
        <circle r="9" fill="${COL.ink}"/>
        <text y="30" text-anchor="middle" style="font-family:'Space Mono',monospace;font-size:11px;fill:${COL.inkSoft}">SALIDA</text></g>`;
    } else if(i === n){
      cps += `<g transform="translate(${x},${LINE_Y})">${coliseoSVG(reached)}
        <text y="42" text-anchor="middle" style="font-family:'Space Mono',monospace;font-size:12px;font-weight:700;fill:${COL.ink}">META</text></g>`;
    } else {
      const mil = i % 10 === 0;
      const c = reached ? checkpointColor(h, i) : null;
      cps += `<g transform="translate(${x},${LINE_Y})">
        <circle r="${mil?11:5.5}" fill="${reached?c:COL.paper}"
          stroke="${reached?c:COL.inkSoft}" stroke-width="${mil?2.5:2}"/>
        ${mil ? `<text y="4" text-anchor="middle" style="font-family:'Space Mono',monospace;font-size:10px;font-weight:700;fill:${reached?COL.white:COL.inkSoft}">${i}</text>` : ""}
      </g>`;
    }
  }
  return `
  <svg width="${svgW}" height="${SVG_H}" viewBox="0 0 ${svgW} ${SVG_H}" style="display:block">
    ${contours}
    <line x1="${PAD}" y1="${LINE_Y}" x2="${svgW-PAD}" y2="${LINE_Y}"
      stroke="${COL.trail}" stroke-width="3" stroke-dasharray="7 8" stroke-linecap="round" opacity="0.55"/>
    ${h.streak > 0 ? `<line x1="${PAD}" y1="${LINE_Y}" x2="${doneX}" y2="${LINE_Y}"
      stroke="${COL.done}" stroke-width="4.5" stroke-linecap="round"/>` : ""}
    ${cps}
    <g id="avatar" style="transform:translate(${avatarStartX}px, ${LINE_Y}px)">
      <ellipse cy="2" rx="16" ry="5" fill="${COL.trail}" opacity="0.18">
        <animate attributeName="rx" values="13;19;13" dur="2.4s" repeatCount="indefinite"/>
      </ellipse>
      ${gladiadorSVG(walking)}
    </g>
  </svg>`;
}

// ============ Utilidades DOM ============
const app = document.getElementById("app");
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ============ Panel de rutina: cálculo de vista previa ============
function routinePreview(h){
  const dc = todayDC(h);
  const doneToday = h.lastCheckIn === localDate();
  const partial = dc.reps.some(r => (r || 0) > 0);
  const preview = dc.totals.map((t, i) => (t || 0) + (dc.reps[i] || 0));
  const previewSeries = (dc.series || 0) + (partial && !doneToday ? 1 : 0);
  const ratios = h.items.map((it, i) => Math.min((preview[i] || 0) / (it.reps * h.seriesTarget), 1));
  const score = ratios.reduce((a, b) => a + b, 0) / ratios.length;
  const canEndSeries = !doneToday && partial;
  const canEndDay = !doneToday && previewSeries >= 1 && h.items.every((_, i) => (preview[i] || 0) >= 1);
  return { dc, doneToday, partial, preview, score, canEndSeries, canEndDay };
}

function routinePanelHTML(h){
  const { dc, doneToday, partial, score, canEndSeries, canEndDay } = routinePreview(h);
  const dots = Array.from({ length: Math.max(h.seriesTarget, dc.series) })
    .map((_, i) => `<span class="dot ${i < dc.series ? "on" : ""}"></span>`).join("");

  const rows = h.items.map((it, i) => {
    const cur = dc.reps[i] || 0;
    const total = dc.totals[i] || 0;
    const cls = cur >= it.reps ? "ok" : cur >= 1 ? "mid" : "";
    const mark = cur >= it.reps ? "✓" : cur >= 1 ? "·" : "";
    return `<div class="row">
      <span class="tick ${cls} ${doneToday ? "locked" : ""}" data-tick="${i}" data-target="${it.reps}" role="${doneToday ? "" : "button"}" aria-label="Poner objetivo de ${esc(it.name)}">${mark}</span>
      <span class="exname">${esc(it.name)}
        <span class="exsub" data-sub="${i}">objetivo ${it.reps}/serie${total > 0 ? ` · acumuladas ${total}` : ""}</span>
      </span>
      ${doneToday
        ? `<span class="total-final">${total}</span>`
        : `<div class="stpwrap">
             <button class="stp" data-dec="${i}" aria-label="Restar repetición">−</button>
             <input class="rep" type="number" inputmode="numeric" min="0" max="999" placeholder="0"
               value="${cur || ""}" data-rep="${i}" aria-label="Repeticiones de ${esc(it.name)} en esta serie" />
             <button class="stp" data-inc="${i}" aria-label="Sumar repetición">+</button>
           </div>`}
    </div>`;
  }).join("");

  let sealedMsg = "";
  if(doneToday){
    const hora = dc.sealedAt
      ? ` a las ${new Date(dc.sealedAt).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})}`
      : "";
    sealedMsg = `✓ Día sellado el ${h.lastCheckIn}${hora} con ${dc.series} ${dc.series===1?"serie":"series"} — inmutable hasta mañana.`;
  }

  return `<div class="rp" id="rp">
    <div class="head">
      <span class="tag">${doneToday ? "RUTINA DE HOY · REGISTRADA" : `SERIE ${dc.series + 1} EN CURSO`}</span>
      <span class="pct" id="rp-pct" style="color:${scoreColor(score)}">${Math.round(score*100)}%</span>
    </div>
    <div class="series-row">SERIES <span id="rp-series-n">${dc.series}</span>/${h.seriesTarget} ${dots}</div>
    ${rows}
    <div class="bar" style="margin-top:12px"><div id="rp-bar" style="width:${score*100}%;background:${scoreColor(score)}"></div></div>
    ${doneToday ? "" : `
    <div class="actions" id="rp-actions">
      <button class="act serie" id="btn-serie" ${canEndSeries ? "" : "disabled"}>✓ Serie terminada</button>
      <button class="act dia" id="btn-dia" ${canEndDay ? "" : "disabled"}>🏁 Día terminado</button>
    </div>`}
    <p class="hintline ${doneToday ? "sealed" : ""}" id="rp-hint">
      ${doneToday
        ? sealedMsg
        : (partial || dc.series > 0)
        ? "«Serie terminada» suma la serie y reinicia los contadores. «Día terminado» sella el día y ya no se puede editar."
        : "Apunta las repeticiones de esta serie. El día vale con ≥1 repetición de cada ejercicio en total y ≥1 serie."}
    </p>
  </div>`;
}

// Actualización en sitio del panel (para no perder el foco al teclear)
function updateRoutineUI(h){
  const { dc, score, canEndSeries, canEndDay } = routinePreview(h);
  const pct = document.getElementById("rp-pct");
  const bar = document.getElementById("rp-bar");
  if(pct){ pct.textContent = `${Math.round(score*100)}%`; pct.style.color = scoreColor(score); }
  if(bar){ bar.style.width = `${score*100}%`; bar.style.background = scoreColor(score); }
  h.items.forEach((it, i) => {
    const cur = dc.reps[i] || 0;
    const tick = document.querySelector(`[data-tick="${i}"]`);
    if(tick){
      tick.className = "tick " + (cur >= it.reps ? "ok" : cur >= 1 ? "mid" : "");
      tick.textContent = cur >= it.reps ? "✓" : cur >= 1 ? "·" : "";
    }
  });
  const bs = document.getElementById("btn-serie");
  const bd = document.getElementById("btn-dia");
  if(bs) bs.disabled = !canEndSeries;
  if(bd && !confirmEnd) bd.disabled = !canEndDay;
}

function bindHold(btn, fn){
  let t = null, iv = null;
  const stop = () => { clearTimeout(t); clearInterval(iv); t = iv = null; };
  btn.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    fn();
    t = setTimeout(() => { iv = setInterval(fn, 110); }, 450);
  });
  ["pointerup","pointerleave","pointercancel"].forEach(ev => btn.addEventListener(ev, stop));
  btn.addEventListener("contextmenu", (e) => e.preventDefault());
}

function bindRoutinePanel(h){
  const repInput = (i) => document.querySelector(`input[data-rep="${i}"]`);
  const step = (i, delta) => {
    const inp = repInput(i);
    if(!inp) return;
    const v = Math.max(0, Math.min(999, (parseInt(inp.value) || 0) + delta));
    inp.value = v || "";
    setReps(h.id, i, v);
  };
  document.querySelectorAll("input[data-rep]").forEach(inp => {
    inp.addEventListener("input", () => setReps(h.id, parseInt(inp.dataset.rep), inp.value));
  });
  document.querySelectorAll("button[data-dec]").forEach(b =>
    bindHold(b, () => step(parseInt(b.dataset.dec), -1)));
  document.querySelectorAll("button[data-inc]").forEach(b =>
    bindHold(b, () => step(parseInt(b.dataset.inc), +1)));
  document.querySelectorAll(".tick:not(.locked)").forEach(t =>
    t.addEventListener("click", () => {
      const i = parseInt(t.dataset.tick);
      const target = parseInt(t.dataset.target) || 1;
      const inp = repInput(i);
      if(!inp) return;
      const cur = parseInt(inp.value) || 0;
      const v = cur >= target ? 0 : target; // toque: objetivo cumplido / deshacer
      inp.value = v || "";
      setReps(h.id, i, v);
    }));
  const bs = document.getElementById("btn-serie");
  if(bs) bs.addEventListener("click", () => finishSeries(h.id));
  const bd = document.getElementById("btn-dia");
  if(bd) bd.addEventListener("click", () => {
    const actions = document.getElementById("rp-actions");
    actions.innerHTML = `
      <button class="act serie" id="btn-serie" disabled>✓ Serie terminada</button>
      <div class="confirm"><span>¿Sellar el día? No podrás editarlo.</span>
        <button class="yes" id="rp-yes">Sí</button><button class="no" id="rp-no">No</button></div>`;
    document.getElementById("rp-yes").addEventListener("click", () => finishDay(h.id));
    document.getElementById("rp-no").addEventListener("click", () => render());
  });
}

// ============ Vistas ============
function render(){
  if(view === "list") return renderList();
  if(view === "form") return renderForm();
  const h = habits.find(x => x.id === view);
  if(!h){ view = "list"; return renderList(); }
  renderPath(h);
}

function renderList(){
  const cards = habits.map(h => {
    const doneToday = h.lastCheckIn === localDate();
    const completed = h.streak >= h.days;
    const pct = Math.round(h.streak/h.days*100);
    let action;
    if(completed){
      action = `<p style="margin:10px 0 0;font-size:14.5px;color:var(--gold);font-weight:600">🏛 Meta alcanzada</p>`;
    } else if(h.type === "checklist"){
      const dc = h.dayChecks && h.dayChecks.date === localDate() ? h.dayChecks : null;
      action = `<button class="btn small ${doneToday?"done":"ink"}" data-open2="${h.id}">
        ${doneToday ? "✓ Hoy registrado" : `Abrir rutina · ${dc ? dc.series || 0 : 0}/${h.seriesTarget} series hoy`}</button>`;
    } else {
      action = `<button class="btn small ${doneToday?"done":""}" data-checkin="${h.id}" ${doneToday?"disabled":""}>
        ${doneToday ? "✓ Hoy registrado" : "Registrar hoy"}</button>`;
    }
    return `
    <div class="card">
      <div data-open="${h.id}" role="button" aria-label="Abrir camino de ${esc(h.name)}" style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <h2>${esc(h.name)}</h2>
          <span class="meta">${h.streak}/${h.days} · ${pct}%</span>
        </div>
        <div class="bar"><div class="${completed?"full":""}" style="width:${pct}%"></div></div>
      </div>
      ${action}
    </div>`;
  }).join("");

  app.innerHTML = `
  <div class="wrap">
    <p class="eyebrow">TUS EXPEDICIONES</p>
    <h1>Caminos en marcha</h1>
    ${notices.map(m => `<div class="banner">${esc(m)}</div>`).join("")}
    ${habits.length === 0 ? `<p class="muted" style="margin:18px 0 24px">
      Todavía no hay ninguna ruta trazada. Crea tu primer hábito y el gladiador se pondrá en marcha.</p>` : ""}
    ${cards}
    <button class="btn ink" id="new" style="margin-top:10px">+ Nueva expedición</button>
  </div>`;

  app.querySelectorAll("[data-open]").forEach(el =>
    el.addEventListener("click", () => { view = el.dataset.open; confirming = null; render(); }));
  app.querySelectorAll("[data-open2]").forEach(el =>
    el.addEventListener("click", e => { e.stopPropagation(); view = el.dataset.open2; confirming = null; render(); }));
  app.querySelectorAll("[data-checkin]").forEach(el =>
    el.addEventListener("click", e => { e.stopPropagation(); checkIn(el.dataset.checkin); }));
  document.getElementById("new").addEventListener("click", () => {
    formState = { name:"", days:90, type:"simple", items:[{name:"",reps:""}], series:3 };
    view = "form"; render();
  });
}

function renderForm(){
  const f = formState;
  const exRows = f.items.map((it, i) => `
    <div class="ex-row">
      <input data-exname="${i}" placeholder="Ejercicio ${i+1} (p. ej. Swings)" value="${esc(it.name)}" />
      <input class="reps" data-exreps="${i}" type="number" inputmode="numeric" min="1" max="999" placeholder="reps" value="${esc(it.reps)}" />
      ${f.items.length > 1 ? `<button class="ex-del" data-exdel="${i}" aria-label="Quitar ejercicio">×</button>` : ""}
    </div>`).join("");

  app.innerHTML = `
  <div class="center"><div>
    <button class="back" id="back">← Expediciones</button>
    <p class="eyebrow">NUEVA EXPEDICIÓN</p>
    <h1>Traza tu camino</h1>
    <p class="muted" style="margin-bottom:28px">Un checkpoint por día. Si un día no registras el hábito,
      la ruta se reinicia y vuelves a la salida.</p>

    <label for="fname">Hábito u objetivo</label>
    <input id="fname" placeholder="Rutina de kettlebell" value="${esc(f.name)}" />

    <label for="fdays" style="margin-top:18px">Días de camino</label>
    <input id="fdays" type="number" inputmode="numeric" min="1" max="365" value="${esc(f.days)}" />

    <label style="margin-top:18px">Tipo de expedición</label>
    <div style="display:flex;gap:10px">
      <button class="type-btn ${f.type==="simple"?"sel":""}" data-type="simple">
        <div class="t">Simple</div><div class="d">Un botón: hecho / no hecho</div></button>
      <button class="type-btn ${f.type==="checklist"?"sel":""}" data-type="checklist">
        <div class="t">Con rutina</div><div class="d">Ejercicios, reps y series</div></button>
    </div>

    ${f.type === "checklist" ? `
    <div style="margin-top:18px">
      <label>Ejercicios (nombre y repeticiones por serie)</label>
      ${exRows}
      <button class="ex-add" id="exadd">+ Añadir ejercicio</button>
      <label style="margin-top:18px" for="fseries">Series objetivo de la rutina</label>
      <input id="fseries" type="number" inputmode="numeric" min="1" max="20" value="${esc(f.series)}" style="width:120px" />
    </div>` : ""}

    <button class="btn" id="start" style="margin-top:28px">Empezar la ruta</button>
  </div></div>`;

  const startBtn = document.getElementById("start");
  function validity(){
    const okName = f.name.trim().length > 0;
    const okItems = f.type === "simple" ||
      f.items.some(it => it.name.trim() && (parseInt(it.reps) || 0) >= 1);
    const ok = okName && okItems;
    startBtn.disabled = !ok;
    startBtn.style.opacity = ok ? "1" : ".4";
  }
  validity();

  document.getElementById("back").addEventListener("click", () => { formState = null; view = "list"; render(); });
  document.getElementById("fname").addEventListener("input", e => { f.name = e.target.value; validity(); });
  document.getElementById("fdays").addEventListener("input", e => { f.days = e.target.value; });
  app.querySelectorAll("[data-type]").forEach(b =>
    b.addEventListener("click", () => { f.type = b.dataset.type; renderForm(); }));
  app.querySelectorAll("[data-exname]").forEach(inp =>
    inp.addEventListener("input", () => { f.items[+inp.dataset.exname].name = inp.value; validity(); }));
  app.querySelectorAll("[data-exreps]").forEach(inp =>
    inp.addEventListener("input", () => { f.items[+inp.dataset.exreps].reps = inp.value; validity(); }));
  app.querySelectorAll("[data-exdel]").forEach(b =>
    b.addEventListener("click", () => { f.items.splice(+b.dataset.exdel, 1); renderForm(); }));
  const exadd = document.getElementById("exadd");
  if(exadd) exadd.addEventListener("click", () => { f.items.push({name:"",reps:""}); renderForm(); });
  const fs = document.getElementById("fseries");
  if(fs) fs.addEventListener("input", e => { f.series = e.target.value; });
  startBtn.addEventListener("click", addHabit);
}

function renderPath(h){
  const n = h.days;
  const today = localDate();
  const doneToday = h.lastCheckIn === today;
  const completed = h.streak >= n;
  const pct = Math.round(h.streak/n*100);
  const isC = a => confirming && confirming.id === h.id && confirming.action === a;

  let mainAction;
  if(completed){
    mainAction = `<div class="gold-box">
      <p class="title">🏛 El gladiador llegó al Coliseo: ${n} días seguidos</p>
      <p class="muted" style="font-size:14px;margin-top:4px">El hábito ya forma parte de ti.</p></div>`;
  } else if(h.type === "checklist"){
    mainAction = routinePanelHTML(h);
  } else {
    mainAction = `<button class="btn ${doneToday?"done":""}" id="checkin" style="margin-top:14px" ${doneToday?"disabled":""}>
      ${doneToday ? "✓ Hoy registrado — hasta mañana" : "Registrar hoy"}</button>`;
  }

  app.innerHTML = `
  <header style="padding:18px 20px 8px">
    <div style="max-width:640px;margin:0 auto">
      <button class="back" id="back">← Expediciones</button>
      <p class="eyebrow">DÍA ${h.streak} DE ${n} · ${pct}%</p>
      <h1 class="small">${esc(h.name)}</h1>
      ${notices.map(m => `<div class="banner">${esc(m)}</div>`).join("")}
      ${mainAction}
    </div>
  </header>
  <main class="scroller" id="scroller">${pathSVG(h)}</main>
  <p class="hint">← desliza para recorrer el camino →</p>
  <div class="opts" id="opts">
    ${!isC("reset") && !isC("delete") ? `
      <button class="btn-ghost" id="oreset">Reiniciar a día 0</button>
      <button class="btn-ghost danger" id="odelete">Borrar hábito</button>` : ""}
    ${isC("reset") ? `<div class="confirm-inline"><span>¿Volver a la salida?</span>
      <button class="yes" id="cyes">Sí</button><button class="no" id="cno">No</button></div>` : ""}
    ${isC("delete") ? `<div class="confirm-inline"><span>¿Borrar este hábito y su progreso?</span>
      <button class="yes" id="cyes">Sí</button><button class="no" id="cno">No</button></div>` : ""}
  </div>`;

  document.getElementById("back").addEventListener("click", () => { view = "list"; confirming = null; render(); });
  const ci = document.getElementById("checkin");
  if(ci) ci.addEventListener("click", () => checkIn(h.id));
  if(h.type === "checklist" && !completed) bindRoutinePanel(h);
  const or = document.getElementById("oreset");
  if(or) or.addEventListener("click", () => { confirming = {id:h.id, action:"reset"}; render(); });
  const od = document.getElementById("odelete");
  if(od) od.addEventListener("click", () => { confirming = {id:h.id, action:"delete"}; render(); });
  const cy = document.getElementById("cyes");
  if(cy) cy.addEventListener("click", () => confirming.action === "reset" ? resetHabit(h.id) : deleteHabit(h.id));
  const cn = document.getElementById("cno");
  if(cn) cn.addEventListener("click", () => { confirming = null; render(); });

  const avatar = document.getElementById("avatar");
  const finalX = PAD + Math.min(h.streak, n)*SPACING;
  if(animFrom !== null){
    requestAnimationFrame(() => requestAnimationFrame(() => {
      avatar.style.transform = `translate(${finalX}px, ${LINE_Y}px)`;
    }));
  }
  const sc = document.getElementById("scroller");
  requestAnimationFrame(() => {
    sc.scrollTo({ left: Math.max(0, finalX - sc.clientWidth/2), behavior:"smooth" });
  });
}

// ============ Arranque ============
load();
checkMissedDays();
render();

// Vigilante de cambio de día: intervalo + recuperación de foco/visibilidad.
// Si la app queda abierta al cruzar la medianoche, desbloquea el nuevo día
// y aplica los reinicios por día fallado sin necesidad de recargar.
function dayWatch(){
  const t = localDate();
  const dayChanged = t !== dateSeen;
  dateSeen = t;
  const resets = checkMissedDays();
  if(dayChanged || resets) render();
}
setInterval(dayWatch, 30000);
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible") dayWatch();
});
window.addEventListener("focus", dayWatch);

// Service worker para funcionamiento sin conexión
if("serviceWorker" in navigator){
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
}
</script>
